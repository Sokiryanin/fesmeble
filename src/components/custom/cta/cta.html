<section data-fls-cta class="cta">
  <div class="cta__container">
    <div class="cta__inner">
      <div>
        <h2 class="cta__title">
          Давайте<br />порахуємо <span class="accent">ваші</span><br />меблі.
        </h2>
        <p class="cta__sub">
          Залиште номер — передзвонимо протягом 2 годин у робочий час.
          Безкоштовний виїзд на обмір у межах Львова.
        </p>
        <div class="contact-info">
          <div class="contact-info__row">
            <span>Телефон</span>
            <a href="tel:+380671234567">+380 67 123 45 67</a>
          </div>
          <div class="contact-info__row">
            <span>Telegram</span>
            <a href="#">@fesmeble</a>
          </div>
          <div class="contact-info__row">
            <span>Email</span>
            <a href="mailto:hello@fesmeble.com">hello@fesmeble.com</a>
          </div>
          <div class="contact-info__row">
            <span>Шоурум</span>
            <span>Вроцлав, вул. Легницка 55</span>
          </div>
          <div class="contact-info__row">
            <span>Графік</span>
            <p>Пн—Сб · 10:00—19:00</p>
          </div>
        </div>
      </div>

      <form
        class="form form--compact"
        onsubmit="
          event.preventDefault();
          window.submitForm();
        "
      >
        <div class="form__row">
          <div class="form__field">
            <label for="text-field-1">Ваше імʼя</label>
            <input
              type="text"
              required
              id="text-field-1"
              name="name"
              aria-required="true"
              autocomplete="name"
            />
          </div>
          <div class="form__field">
            <label for="tel-field-2">Телефон</label>
            <input
              type="tel"
              placeholder="+380"
              required
              id="tel-field-2"
              name="phone"
              aria-required="true"
              autocomplete="tel"
            />
          </div>
        </div>

        <fieldset class="form__field form__fieldset">
          <legend>Що вас цікавить?</legend>
          <div class="form__chips">
            <button
              type="button"
              class="chip"
              aria-pressed="false"
              data-value="kitchen"
             
              onclick="
                this.setAttribute(
                  'aria-pressed',
                  this.getAttribute('aria-pressed') === 'true'
                    ? 'false'
                    : 'true'
                )
              "
            >
              Кухня
            </button>
            <button
              type="button"
              class="chip"
              aria-pressed="false"
              data-value="wardrobe"
             
              onclick="
                this.setAttribute(
                  'aria-pressed',
                  this.getAttribute('aria-pressed') === 'true'
                    ? 'false'
                    : 'true'
                )
              "
            >
              Гардероб
            </button>
            <button
              type="button"
              class="chip"
              aria-pressed="false"
              data-value="closet"
             
              onclick="
                this.setAttribute(
                  'aria-pressed',
                  this.getAttribute('aria-pressed') === 'true'
                    ? 'false'
                    : 'true'
                )
              "
            >
              Шафа
            </button>
            <button
              type="button"
              class="chip"
              aria-pressed="false"
              data-value="office"
             
              onclick="
                this.setAttribute(
                  'aria-pressed',
                  this.getAttribute('aria-pressed') === 'true'
                    ? 'false'
                    : 'true'
                )
              "
            >
              Офіс
            </button>
            <button
              type="button"
              class="chip"
              aria-pressed="false"
              data-value="other"
             
              onclick="
                this.setAttribute(
                  'aria-pressed',
                  this.getAttribute('aria-pressed') === 'true'
                    ? 'false'
                    : 'true'
                )
              "
            >
              Інше
            </button>
          </div>
        </fieldset>

        <div class="form__field">
          <label for="select-field-3">
            Коли зручно передзвонити
          </label>
          <select id="select-field-3" name="when">
            <option value="asap">Якнайшвидше</option>
            <option value="today">
              Сьогодні до 18:00
            </option>
            <option value="tomorrow-am">
              Завтра зранку
            </option>
            <option value="tomorrow-pm">
              Завтра після обіду
            </option>
          </select>
        </div>

        <div class="form__field">
          <label for="message-cta" class="visually-hidden">
            Коротко про проєкт
          </label>
          <textarea
            id="message-cta"
            name="message"
            placeholder="Коротко про проєкт"
            rows="4"
          ></textarea>
        </div>

        <button type="submit" class="form__submit">
          <span>отримати прорахунок</span>
          <span class="form__submit-arrow" aria-hidden="true"><svg width="20" height="20"><use href="#i-arrow-right"/></svg></span>
        </button>
      </form>
    </div>
  </div>
</section>
